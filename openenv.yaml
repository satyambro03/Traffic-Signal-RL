tasks:
  - name: EmailSort
    action_space:
      type: Discrete
      size: 3
      description: Work, Personal, Spam
    observation_space:
      type: Box
      shape: [10]
      low: 0
      high: 1
      dtype: float32
    task_description: The agent needs to sort emails into 'Work', 'Personal', or 'Spam' categories based on a 10-dimensional observation. Reward is 1.0 for correct classification and 0.0 otherwise.

  - name: TrafficSignal
    action_space:
      type: Discrete
      size: 3
      description: Red, Green, Orange
    observation_space:
      type: Box
      shape: [4]
      low: 0
      high: 20
      dtype: int
    task_description: The agent controls a single traffic signal to reduce jams. Reward is positive if queue length decreases, 0.0 if jam persists.

  - name: MultiIntersection
    action_space:
      type: Discrete
      size: 6
      description: Control multiple signals simultaneously
    observation_space:
      type: Box
      shape: [8]
      low: 0
      high: 50
      dtype: int
    task_description: The agent optimizes multiple intersections during rush hour. Reward is 1.0 for smooth flow, partial reward for improvement, 0.0 if congestion increases.