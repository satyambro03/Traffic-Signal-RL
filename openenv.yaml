tasks:
  - name: EmailSort
    action_space:
      type: Discrete
      size: 3
      description: Work, Personal, Spam
    observation_space:
      type: Box
      shape: [10]
      low: 0
      high: 1
      dtype: float32
    task_description: Agent sorts emails into categories.

  - name: TrafficSignal
    action_space:
      type: Discrete
      size: 3
      description: Red, Green, Orange
    observation_space:
      type: Box
      shape: [4]
      low: 0
      high: 20
      dtype: int
    task_description: Agent controls a single traffic signal to reduce jams.


  - name: MultiIntersection
    action_space:
      type: Discrete
      size: 6
      description: Control multiple signals simultaneously
    observation_space:
      type: Box
      shape: [8]
      low: 0
      high: 50
      dtype: int
    task_description: Agent optimizes multiple intersections during rush hour.
